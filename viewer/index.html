<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Food Fight — replay viewer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Food Fight — Level 1 replay</h1>
      <div class="controls">
        <label>
          run
          <select id="run-select"></select>
        </label>
        <label>
          replay
          <select id="replay-select"></select>
        </label>
        <button id="play-btn">▶ play</button>
        <label>
          speed
          <input id="speed" type="range" min="1" max="20" value="5" />
          <span id="speed-val">5×</span>
        </label>
        <span id="status"></span>
      </div>
      <div class="scrubber">
        <input id="scrubber" type="range" min="0" max="0" value="0" step="1" />
        <span id="tick-label">tick 0 / 0 — turn 0</span>
      </div>
    </header>
    <main>
      <canvas id="board" width="990" height="720"></canvas>
      <aside id="side-panel">
        <section id="battle-panel" class="hidden">
          <h2>
            <span id="battle-title">battle</span>
            <span id="battle-step-controls">
              <button id="battle-prev" title="previous action">◀</button>
              <button id="battle-toggle" title="play / pause">▶</button>
              <button id="battle-next" title="next action">▶▶</button>
              <button id="battle-jump-end" title="skip to result">⏭</button>
            </span>
          </h2>
          <div id="battle-rosters"></div>
          <ol id="battle-log"></ol>
        </section>
        <section id="inspect-panel">
          <h2>inspect (click a tile)</h2>
          <div id="inspect-content" class="empty">no tile selected</div>
        </section>
        <section id="posts-panel">
          <details open>
            <summary>posts (<span id="posts-count">0</span>)</summary>
            <div id="posts-content"></div>
          </details>
        </section>
        <section id="parties-panel">
          <details>
            <summary>parties + units (<span id="parties-count">0</span>)</summary>
            <pre id="parties-content"></pre>
          </details>
        </section>
        <section id="event-log">
          <h2>events near this tick</h2>
          <ul id="log-list"></ul>
        </section>
      </aside>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
