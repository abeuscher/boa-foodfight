name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm duplication
      # Build the viewer replay bundle (minimal seed range — the
      # snapshot suite only reads baseline seeds 1..3) so
      # viewer/replay-snapshot.test.ts runs for real instead of
      # skipping, and so a broken build:viewer pipeline fails CI too.
      - run: pnpm build:viewer --seeds 1..3
      - run: pnpm test
